<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generatore QR Semplice</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
h1 { font-size: 1.3rem; margin-bottom: 20px; color: #222; }

.form { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 12px; }

label { font-size: 0.8rem; font-weight: bold; color: #555; display: block; margin-bottom: 4px; }
input, select, textarea {
  width: 100%; padding: 9px 12px; border: 1.5px solid #ddd; border-radius: 4px;
  font-size: 0.9rem; font-family: Arial, sans-serif; outline: none;
}
input:focus, select:focus, textarea:focus { border-color: #333; }
textarea { min-height: 120px; resize: vertical; line-height: 1.6; }

.row { display: flex; gap: 10px; }
.row > div { flex: 1; }

button {
  width: 100%; padding: 13px; background: #222; color: #fff; border: none;
  border-radius: 4px; font-size: 0.9rem; font-weight: bold; cursor: pointer;
}
button:hover { background: #444; }

/* GRIGLIA BADGE */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }

.badge {
  background: #fff; border: 1px solid #ddd; border-radius: 8px;
  padding: 16px; text-align: center; cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08); transition: box-shadow 0.15s;
}
.badge:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.15); }
.badge canvas { display: block; margin: 0 auto 10px; }
.badge-name { font-weight: bold; font-size: 1rem; color: #111; }
.badge-info { font-size: 0.72rem; color: #888; margin-top: 4px; }
.badge-hint { font-size: 0.65rem; color: #bbb; margin-top: 8px; }

@media print {
  .form, h1 { display: none !important; }
  .grid { grid-template-columns: repeat(3, 1fr); gap: 8mm; }
  .badge { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
}
</style>
</head>
<body>

<h1>Generatore QR Semplice</h1>

<div class="form">
  <div class="row">
    <div>
      <label>Nome Evento</label>
      <input type="text" id="eventName" placeholder="es. Convegno 2025">
    </div>
    <div>
      <label>Data</label>
      <input type="text" id="eventDate" placeholder="es. 15/06/2025">
    </div>
  </div>
  <div class="row">
    <div>
      <label>Giorno Autorizzato</label>
      <select id="day">
        <option value="">Tutti i giorni</option>
        <option value="Lunedì">Lunedì</option>
        <option value="Martedì">Martedì</option>
        <option value="Mercoledì">Mercoledì</option>
        <option value="Giovedì">Giovedì</option>
        <option value="Venerdì">Venerdì</option>
        <option value="Sabato">Sabato</option>
        <option value="Domenica">Domenica</option>
      </select>
    </div>
    <div>
      <label>Ruolo (opzionale)</label>
      <input type="text" id="role" placeholder="es. Capitano, VIP...">
    </div>
  </div>
  <div>
    <label>Nomi (uno per riga)</label>
    <textarea id="names" placeholder="Mario Rossi&#10;Giulia Bianchi&#10;Luca Verdi"></textarea>
  </div>
  <button onclick="genera()">GENERA QR</button>
</div>

<div class="grid" id="grid"></div>

<script>
function genera() {
  var evento = document.getElementById('eventName').value.trim();
  var data   = document.getElementById('eventDate').value.trim();
  var giorno = document.getElementById('day').value;
  var ruolo  = document.getElementById('role').value.trim();
  var nomi   = document.getElementById('names').value
                 .split('\n').map(function(n){ return n.trim(); }).filter(function(n){ return n; });

  if (!nomi.length) { alert('Inserisci almeno un nome.'); return; }

  var grid = document.getElementById('grid');
  grid.innerHTML = '';

  nomi.forEach(function(nome, i) {
    var id = 'P' + String(i + 1).padStart(3, '0');

    // Testo QR — semplice e leggibile
    var righe = [];
    if (evento) righe.push('EVENTO: ' + evento);
    if (data)   righe.push('DATA: ' + data);
    righe.push('NOME: ' + nome);
    if (ruolo)  righe.push('RUOLO: ' + ruolo);
    if (giorno) righe.push('GIORNO: ' + giorno);
    righe.push('ID: ' + id);
    var testo = righe.join('\n');

    // Card
    var card = document.createElement('div');
    card.className = 'badge';

    var canvas = document.createElement('canvas');
    new QRious({ element: canvas, value: testo, size: 180,
      foreground: '#000000', background: '#ffffff', level: 'M' });

    var nameEl = document.createElement('div');
    nameEl.className = 'badge-name';
    nameEl.textContent = nome;

    var infoEl = document.createElement('div');
    infoEl.className = 'badge-info';
    var info = [];
    if (evento) info.push(evento);
    if (giorno) info.push(giorno);
    if (ruolo)  info.push(ruolo);
    infoEl.textContent = info.join(' · ') || id;

    var hintEl = document.createElement('div');
    hintEl.className = 'badge-hint';
    hintEl.textContent = 'Clicca per scaricare';

    card.appendChild(canvas);
    card.appendChild(nameEl);
    card.appendChild(infoEl);
    card.appendChild(hintEl);

    (function(c, n, idx) {
      c.onclick = function() { scarica(c, n, idx); };
    })(card, nome, i);

    grid.appendChild(card);
  });
}

function scarica(card, nome, idx) {
  var src = card.querySelector('canvas');
  var a = document.createElement('a');
  a.href = src.toDataURL('image/png');
  a.download = 'qr_' + nome.replace(/\s+/g, '_') + '.png';
  a.click();
}
</script>
</body>
</html>
